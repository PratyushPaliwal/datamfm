# Track 1 — Document Parsing Configuration
# Current baseline: Docling only, no Claude, no Gemini, no PaddleOCR-VL.

pipeline:
  primary_model: docling
  max_workers: 1

postprocess:
  normalise_text: true
  lint_html_tables: true
  validate_latex: false
  sort_by_bbox: false

output:
  format: markdown
  formula_display: "$$"
  formula_inline: "$"
  table_format: html