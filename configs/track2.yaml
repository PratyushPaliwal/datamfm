pipeline:
  csv_model: deplot
  summary_model: rule_based
  max_workers: 1
  max_new_tokens: 512
  splits:
    - real
    - synthetic

output:
  csv_file: chart2csv_predictions.jsonl
  summary_file: chart2summary_predictions.jsonl

postprocess:
  strip_code_fences: true
  validate_csv: true

prompts:
  deplot_prompt: "Generate the underlying data table of the chart."