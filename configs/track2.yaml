# Track 2 — Chart Understanding Configuration

pipeline:
  csv_model: openrouter/free              # options: claude | gemini-2.5-pro | qwen3-vl
  summary_model: openrouter/free
  
  # Run both tasks in parallel per image
  parallel_tasks: true
  max_workers: 1                    # keep at 1 during testing, increase for full run

  # Splits to process
  splits:
    - real
    - synthetic

postprocess:
  enforce_numeric_precision: true
  validate_csv: true
  min_numbers_in_summary: 3

output:
  csv_file: chart2csv_predictions.jsonl
  summary_file: chart2summary_predictions.jsonl
