# Track 2 — Chart Understanding (optimised config)

pipeline:
  # Best free vision model for chart data extraction
  csv_model: openrouter/free
  summary_model: openrouter/free

  # Keep at 1 for free tier rate limits; increase for paid/HPC
  max_workers: 1

  splits:
    - real
    - synthetic

postprocess:
  # Conservative — don't over-normalise, GT preserves original label text
  normalise_numbers: true
  validate_csv: true

output:
  csv_file: chart2csv_predictions.jsonl
  summary_file: chart2summary_predictions.jsonl
